<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyVideos</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <h1>MyVideos</h1>
  <input type="text" id="search" placeholder="Search videos...">
</header>

<!-- MAIN LAYOUT -->
<div class="main">

  <!-- LEFT SIDE (VIDEO PLAYER) -->
  <div class="left">

    <div class="video-container">
      <video id="player" controls></video>
    </div>

    <div class="video-title" id="title">Select a video</div>
    <div class="video-creator" id="creator"> </div>

  </div>

  <!-- RIGHT SIDE (SIDEBAR VIDEOS) -->
  <div class="right" id="sidebar">
    <!-- JS will insert videos here -->
  </div>

</div>

<!-- OPTIONAL HOME GRID (hidden or used for homepage view later) -->
<div class="grid" id="homeGrid" style="display:none;">
  <!-- JS can populate this -->
</div>

<script src="script.js"></script>

</body>
</html>
